<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREEDER ARENA V2</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.29.9.min.js"></script>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Arial', sans-serif; touch-action: none; }
        canvas { display: block; background: #222; }
        
        /* GİRİŞ MENÜSÜ */
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                background: rgba(0,0,0,0.95); padding: 30px; border: 3px solid #4CAF50; 
                border-radius: 20px; color: white; text-align: center; z-index: 1000; width: 280px; }
        h1 { color: #4CAF50; margin-bottom: 20px; letter-spacing: 3px; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; font-size: 16px; }
        button { width: 95%; padding: 15px; background: #4CAF50; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #45a049; transform: scale(1.05); }

        /* MOBİL KONTROLLER */
        #j-bg { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; display: none; z-index: 500; }
        #j-t { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #4CAF50; border-radius: 50%; box-shadow: 0 0 15px #4CAF50; }
        #f-b { position: absolute; bottom: 65px; right: 50px; width: 90px; height: 90px; background: rgba(255,0,0,0.6); border: 3px solid white; border-radius: 50%; display: none; z-index: 500; color: white; text-align: center; line-height: 90px; font-weight: bold; font-size: 18px; user-select: none; box-shadow: 0 0 20px rgba(255,0,0,0.4); }
    </style>
</head>
<body>
    <div id="j-bg"><div id="j-t"></div></div>
    <div id="f-b">FIRE</div>
    <div id="menu">
        <h1>CREEDER</h1>
        <input type="text" id="n" placeholder="Takma Adın" maxlength="10">
        <input type="text" id="o" placeholder="Oda Kodu (örn: 1907)">
        <button onclick="baslat()">SAVAŞA KATIL</button>
    </div>
    <canvas id="c"></canvas>

<script>
const cv = document.getElementById('c'), cx = cv.getContext('2d');
let pn, od, ak = false, b = { x: 300, y: 300, id: 'p'+Math.random(), r: 'orange', n: '', m: [] }, rk = {}, ts = {};
let jAk = false, jX = 0, jY = 0;

function res() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
window.onresize = res; res();

function baslat() {
    b.n = document.getElementById('n').value || "Pilot";
    od = document.getElementById('o').value || "1907";
    document.getElementById('menu').style.display = 'none';
    if('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        document.getElementById('j-bg').style.display = 'block';
        document.getElementById('f-b').style.display = 'block';
    }
    ak = true;
    pn = new PubNub({ 
        publishKey: 'pub-c-8f430635-f09b-4394-874b-22003f905007', 
        subscribeKey: 'sub-c-0720616b-952a-43cf-87eb-07f9208007a1', 
        uuid: b.id 
    });
    pn.subscribe({ channels: [od] });
    pn.addListener({ message: (m) => {
        let d = m.message;
        if(d.t === 'p' && d.id !== b.id) rk[d.id] = {...d, s: Date.now()};
        if(d.t === 'a' && d.id !== b.id) { if(rk[d.id]) rk[d.id].m.push(d.mer); }
        if(d.t === 'h' && d.hedef === b.id) { b.x = Math.random()*(cv.width-40)+20; b.y = Math.random()*(cv.height-40)+20; }
    }});
    setInterval(() => { if(ak) pn.publish({ channel: od, message: { t: 'p', ...b, m: [] } }); }, 50);
    loop();
}

// JOYSTICK KONTROL
document.getElementById('j-bg').addEventListener('touchstart', (e) => { jAk = true; e.preventDefault(); });
window.addEventListener('touchmove', (e) => {
    if(!jAk) return; let t = e.touches[0], r = document.getElementById('j-bg').getBoundingClientRect();
    let dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
    let d = Math.min(60, Math.hypot(dx, dy)), a = Math.atan2(dy, dx);
    jX = Math.cos(a) * (d/60); jY = Math.sin(a) * (d/60);
    document.getElementById('j-t').style.transform = `translate(${jX*40}px, ${jY*40}px)`;
});
window.addEventListener('touchend', () => { jAk = false; jX = 0; jY = 0; document.getElementById('j-t').style.transform = 'translate(0,0)'; });

// ATEŞ ETME
document.getElementById('f-b').addEventListener('touchstart', (e) => { e.preventDefault(); ates(); });
window.onpointerdown = (e) => { if(ak && !('ontouchstart' in window) && e.target.id === 'c') ates(); };

function ates() {
    let m = { x: b.x, y: b.y, a: Math.random()*Math.PI*2, s: 12, r: 10 };
    b.m.push(m); pn.publish({ channel: od, message: { t: 'a', id: b.id, mer: m } });
}

window.onkeydown = (e) => ts[e.key.toLowerCase()] = true;
window.onkeyup = (e) => ts[e.key.toLowerCase()] = false;

function ciz(t) {
    // TANK
    cx.fillStyle = t.r; cx.fillRect(t.x-20, t.y-20, 40, 40);
    cx.strokeStyle = "white"; cx.lineWidth = 2; cx.strokeRect(t.x-20, t.y-20, 40, 40);
    // İSİM
    cx.fillStyle = "white"; cx.font = "bold 14px Arial"; cx.textAlign = "center";
    cx.fillText(t.n, t.x, t.y-30);
    // MERMİLER
    for(let i=t.m.length-1; i>=0; i--) {
        let m = t.m[i]; m.x += Math.cos(m.a)*m.s; m.y += Math.sin(m.a)*m.s;
        cx.fillStyle = "yellow"; cx.beginPath(); cx.arc(m.x, m.y, m.r, 0, Math.PI*2); cx.fill();
        if(t.id === b.id) {
            Object.values(rk).forEach(r => {
                if(Math.hypot(r.x-m.x, r.y-m.y) < 30) { pn.publish({ channel: od, message: { t: 'h', hedef: r.id } }); t.m.splice(i, 1); }
            });
        }
        if(m.x<0 || m.x>cv.width || m.y<0 || m.y>cv.height) t.m.splice(i, 1);
    }
}

function loop() {
    if(!ak) return; cx.clearRect(0,0,cv.width,cv.height);
    // HAREKET
    if(ts['w'] && b.y > 20) b.y-=5; if(ts['s'] && b.y < cv.height-20) b.y+=5;
    if(ts['a'] && b.x > 20) b.x-=5; if(ts['d'] && b.x < cv.width-20) b.x+=5;
    let nX = b.x + jX*6, nY = b.y + jY*6;
    if(nX > 20 && nX < cv.width-20) b.x = nX; if(nY > 20 && nY < cv.height-20) b.y = nY;
    
    ciz(b);
    Object.values(rk).forEach(r => { if(Date.now()-r.s < 3000) ciz(r); });
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
