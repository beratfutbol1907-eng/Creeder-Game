<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREEDER ARENA - FIX</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.29.9.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #333; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; font-weight: bold; }
        #exitBtn { 
            position: absolute; top: 10px; right: 10px; 
            padding: 10px 20px; background: #f44336; color: white; 
            border-radius: 8px; z-index: 100; cursor: pointer; border: 2px solid white; display: none;
        }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; 
                color: white; text-align: center; border: 2px solid #4CAF50; z-index: 200; width: 280px; }
        input { padding: 12px; margin: 10px 0; border-radius: 8px; border: none; width: 90%; font-size: 16px; }
        button { padding: 15px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div id="ui"><div id="stats">Can: 100 | Oda: -</div></div>
<div id="exitBtn" onclick="location.reload()">MENÜ / ÇIKIŞ</div>

<div id="menu">
    <h1>CREEDER</h1>
    <input type="text" id="username" placeholder="Pilot İsmi" maxlength="10">
    <input type="text" id="roomCode" placeholder="Oda Kodu">
    <button onclick="joinGame()">BAŞLAT</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let pubnub, room, gameActive = false;
let myTank = { x: 100, y: 100, id: '', name: '', color: '', health: 100, bullets: [] };
let tanks = {};
const keys = {};

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

function joinGame() {
    myTank.name = document.getElementById('username').value || "Pilot";
    room = document.getElementById('roomCode').value || "1907";
    myTank.id = 'p-' + Math.random().toString(36).substr(2, 9);
    myTank.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
    
    document.getElementById('menu').style.display = 'none';
    document.getElementById('exitBtn').style.display = 'block';
    gameActive = true;

    pubnub = new PubNub({
        publishKey: 'pub-c-8f430635-f09b-4394-874b-22003f905007',
        subscribeKey: 'sub-c-0720616b-952a-43cf-87eb-07f9208007a1',
        uuid: myTank.id
    });

    pubnub.subscribe({ channels: [room] });
    pubnub.addListener({
        message: (m) => {
            if (m.message.type === 'move' && m.message.id !== myTank.id) tanks[m.message.id] = {...m.message, lastSeen: Date.now()};
            if (m.message.type === 'shoot' && m.message.id !== myTank.id) { if(tanks[m.message.id]) tanks[m.message.id].bullets.push(m.message.bullet); }
            if (m.message.type === 'hit' && m.message.targetId === myTank.id) { myTank.health -= 100; if(myTank.health <= 0) respawn(); }
        }
    });

    setInterval(() => { if(gameActive) pubnub.publish({ channel: room, message: { type: 'move', ...myTank, bullets: [] } }); }, 50);
    gameLoop();
}

window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; if(e.key === "Escape") location.reload(); };
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

window.onpointerdown = (e) => {
    if (!gameActive || e.target.id === 'exitBtn') return;
    const angle = Math.atan2(e.clientY - myTank.y, e.clientX - myTank.x);
    // TEK ATAN DEV MERMİ
    const bullet = { x: myTank.x, y: myTank.y, angle: angle, speed: 12, radius: 15 };
    myTank.bullets.push(bullet);
    pubnub.publish({ channel: room, message: { type: 'shoot', id: myTank.id, bullet: bullet } });
};

function respawn() { myTank.health = 100; myTank.x = Math.random()*(canvas.width-40)+20; myTank.y = Math.random()*(canvas.height-40)+20; }

function draw(t) {
    // 1. Tankı Çiz
    ctx.fillStyle = t.color;
    ctx.fillRect(t.x - 20, t.y - 20, 40, 40);
    ctx.strokeStyle = "white";
    ctx.strokeRect(t.x - 20, t.y - 20, 40, 40);
    
    // 2. İsim Çiz
    ctx.fillStyle = "white";
    ctx.font = "bold 14px Arial";
    ctx.textAlign = "center";
    ctx.fillText(t.name, t.x, t.y - 30);

    // 3. Mermileri Çiz
    for(let i = t.bullets.length - 1; i >= 0; i--) {
        let b = t.bullets[i];
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        
        ctx.fillStyle = "yellow";
        ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill();

        if (t.id === myTank.id) {
            Object.values(tanks).forEach(enemy => {
                if (Math.hypot(enemy.x - b.x, enemy.y - b.y) < 30) {
                    pubnub.publish({ channel: room, message: { type: 'hit', targetId: enemy.id } });
                    t.bullets.splice(i, 1);
                }
            });
        }
        if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) t.bullets.splice(i, 1);
    }
}

function gameLoop() {
    if (!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (keys['w']) myTank.y -= 5; if (keys['s']) myTank.y += 5;
    if (keys['a']) myTank.x -= 5; if (keys['d']) myTank.x += 5;

    draw(myTank);
    Object.values(tanks).forEach(t => { if (Date.now() - t.lastSeen < 3000) draw(t); });
    
    document.getElementById('stats').innerText = `Can: ${myTank.health} | Oda: ${room}`;
    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
