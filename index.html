<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CREEDER ARENA - TEK ATAN MOD</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.29.9.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #333; cursor: crosshair; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; color: white; text-align: center; border: 2px solid #4CAF50; }
        input { padding: 10px; margin: 10px; border-radius: 5px; border: none; width: 200px; font-size: 16px; }
        button { padding: 12px 25px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; }
        button:hover { background: #45a049; }
        h1 { color: #4CAF50; margin-bottom: 20px; text-shadow: 2px 2px #000; }
        .controls { font-size: 12px; color: #aaa; margin-top: 15px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="stats">Can: 100 | Oda: -</div>
</div>

<div id="menu">
    <h1>CREEDER ARENA</h1>
    <input type="text" id="username" placeholder="Pilot İsmi" maxlength="10"><br>
    <input type="text" id="roomCode" placeholder="Oda Kodu (Örn: 1907)"><br>
    <button onclick="joinGame()">SAVAŞI BAŞLAT!</button>
    <div class="controls">WASD ile Hareket | Mouse ile Ateş (TEK ATAR!)</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let pubnub;
let myTank = { x: 0, y: 0, angle: 0, id: '', name: '', color: '', health: 100, bullets: [] };
let tanks = {};
let room = '';
let gameActive = false;

function joinGame() {
    const name = document.getElementById('username').value || "Adsız";
    room = document.getElementById('roomCode').value || "Genel";
    if(!room) return alert("Oda kodu gir!");

    myTank.id = 'p-' + Math.random().toString(36).substr(2, 9);
    myTank.name = name;
    myTank.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
    myTank.x = Math.random() * (window.innerWidth - 50) + 25;
    myTank.y = Math.random() * (window.innerHeight - 50) + 25;

    document.getElementById('menu').style.display = 'none';
    gameActive = true;

    pubnub = new PubNub({
        publishKey: 'pub-c-8f430635-f09b-4394-874b-22003f905007',
        subscribeKey: 'sub-c-0720616b-952a-43cf-87eb-07f9208007a1',
        uuid: myTank.id
    });

    pubnub.subscribe({ channels: [room] });
    pubnub.addListener({
        message: (m) => {
            if (m.message.type === 'move' && m.message.id !== myTank.id) {
                tanks[m.message.id] = m.message;
            }
            if (m.message.type === 'shoot' && m.message.id !== myTank.id) {
                if (tanks[m.message.id]) tanks[m.message.id].bullets.push(m.message.bullet);
            }
            if (m.message.type === 'hit' && m.message.targetId === myTank.id) {
                myTank.health -= 100; // TEK ATIŞTA ÖLÜM!
                if(myTank.health <= 0) respawn();
            }
        }
    });

    setInterval(sendPos, 50);
    requestAnimationFrame(gameLoop);
}

function sendPos() {
    if (!gameActive) return;
    pubnub.publish({
        channel: room,
        message: { type: 'move', ...myTank, bullets: [] }
    });
}

const keys = {};
window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

window.onmousedown = (e) => {
    if (!gameActive) return;
    const angle = Math.atan2(e.clientY - myTank.y, e.clientX - myTank.x);
    // DEV MERMİ AYARI
    const bullet = { x: myTank.x, y: myTank.y, angle: angle, speed: 12, radius: 12 };
    myTank.bullets.push(bullet);
    pubnub.publish({ channel: room, message: { type: 'shoot', id: myTank.id, bullet: bullet } });
};

function respawn() {
    myTank.health = 100;
    myTank.x = Math.random() * (window.innerWidth - 50) + 25;
    myTank.y = Math.random() * (window.innerHeight - 50) + 25;
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    if (keys['w']) myTank.y -= 4;
    if (keys['s']) myTank.y += 4;
    if (keys['a']) myTank.x -= 4;
    if (keys['d']) myTank.x += 4;

    // Kendi tankımızı çiz
    drawTank(myTank);
    
    // Diğer tankları çiz
    Object.values(tanks).forEach(t => {
        if (Date.now() - t.lastSeen > 5000) delete tanks[t.id];
        else drawTank(t);
    });

    document.getElementById('stats').innerText = `Can: ${myTank.health} | Oda: ${room} | Pilot: ${myTank.name}`;
    requestAnimationFrame(gameLoop);
}

function drawTank(t) {
    ctx.save();
    ctx.translate(t.x, t.y);
    
    // Tank gövdesi
    ctx.fillStyle = t.color;
    ctx.fillRect(-20, -20, 40, 40);
    ctx.strokeStyle = "white";
    ctx.strokeRect(-20, -20, 40, 40);
    
    // İsim etiketi
    ctx.fillStyle = "white";
    ctx.font = "12px Arial";
    ctx.fillText(t.name, -20, -30);

    // Mermileri yönet (DEV MERMİLER)
    t.bullets.forEach((b, index) => {
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        
        ctx.restore(); ctx.save();
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "orange";
        ctx.stroke();

        // Çarpışma kontrolü (Tek Atan)
        if (t.id === myTank.id) {
            Object.values(tanks).forEach(enemy => {
                let dist = Math.hypot(enemy.x - b.x, enemy.y - b.y);
                if (dist < 30) {
                    pubnub.publish({ channel: room, message: { type: 'hit', targetId: enemy.id } });
                    t.bullets.splice(index, 1);
                }
            });
        }
    });

    ctx.restore();
}
</script>
</body>
</html>
