<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Creeder Tank Arena - Pro</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(0,0,0,0.92); color: white; }
        .active { display: flex !important; }
        .panel { background: #2b1d0e; padding: 30px; border: 4px solid #d4e157; border-radius: 20px; text-align: center; width: 320px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        h1 { margin-top: 0; color: #d4e157; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; text-align: center; }
        .tank-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .tank-box { aspect-ratio: 1; border: 2px solid #5d4037; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .selected { border-color: #d4e157; background: rgba(212, 225, 87, 0.3); transform: scale(1.1); }
        .t-p { width: 25px; height: 25px; border-radius: 4px; }
        button { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; background: #d4e157; color: #1b1108; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        
        #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 50; }
        #ammo-bar { position: absolute; top: 20px; left: 20px; display: flex; gap: 6px; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 12px; border: 1px solid #555; }
        .b-dot { width: 10px; height: 25px; background: #ffd54f; border-radius: 3px; box-shadow: 0 0 8px orange; }
        .empty { background: #333; box-shadow: none; opacity: 0.4; }
        #score-tag { position: absolute; top: 20px; right: 20px; color: gold; font-size: 22px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 12px 20px; border-radius: 12px; border: 1px solid gold; }
        
        #ctrl { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: auto; }
        .j-base { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; border: 2px solid rgba(255,255,255,0.4); }
        .j-stick { width: 50px; height: 50px; background: white; border-radius: 50%; position: absolute; top: 35px; left: 35px; box-shadow: 0 0 15px white; }
        .f-btn { width: 100px; height: 100px; background: radial-gradient(#ff5252, #b71c1c); border-radius: 50%; border: 4px solid white; box-shadow: 0 0 20px rgba(255,0,0,0.5); }
    </style>
</head>
<body>

<audio id="birds" loop><source src="https://www.soundjay.com/nature/sounds/birds-chirping-05.mp3" type="audio/mpeg"></audio>

<div id="menu" class="screen active">
    <div class="panel">
        <h1>CREEDER ARENA</h1>
        <input type="text" id="nick" placeholder="Pilot İsmi" value="Pilot">
        <div class="tank-grid">
            <div class="tank-box selected" onclick="pick(0, '#4CAF50')"><div class="t-p" style="background:#4CAF50"></div></div>
            <div class="tank-box" onclick="pick(1, '#2196F3')"><div class="t-p" style="background:#2196F3"></div></div>
            <div class="tank-box" onclick="pick(2, '#9C27B0')"><div class="t-p" style="background:#9C27B0"></div></div>
            <div class="tank-box" onclick="pick(3, '#FF9800')"><div class="t-p" style="background:#FF9800"></div></div>
        </div>
        <button onclick="nav('lobby')">LOBİYE KATIL</button>
    </div>
</div>

<div id="lobby" class="screen">
    <div class="panel">
        <h2>ODA KODU</h2>
        <input type="number" id="room" placeholder="Kodu buraya yaz">
        <button onclick="start()">SAVAŞI BAŞLAT!</button>
        <button style="background:#555; color:white;" onclick="location.reload()">GERİ GİT</button>
    </div>
</div>

<div id="ui">
    <div id="ammo-bar"></div>
    <div id="score-tag">SKOR: <span id="gameScore">0</span></div>
    <div id="ctrl">
        <div class="j-base" id="jBase"><div class="j-stick" id="jStick"></div></div>
        <div class="f-btn" id="fBtn"></div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let pubnub, channel, myId = "P-" + Math.random().toString(36).substr(2,4);
    
    const WORLD = 2000;
    let obstacles = [
        {x: 400, y: 400, w: 140, h: 140, type: 'bale', hp: 3},
        {x: 1460, y: 400, w: 140, h: 140, type: 'bale', hp: 3},
        {x: 400, y: 1460, w: 140, h: 140, type: 'bale', hp: 3},
        {x: 1460, y: 1460, w: 140, h: 140, type: 'bale', hp: 3},
        {x: 850, y: 300, w: 300, h: 40, type: 'fence'},
        {x: 850, y: 1660, w: 300, h: 40, type: 'fence'}
    ];

    let myColor = '#4CAF50';
    let game = { active: false, score: 0, player: { x: 1000, y: 1000, a: 0, ammo: 5, hp: 100, speed: 6, shielded: false }, enemies: {}, bullets: [], powerups: [] };

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(id !== 'none') document.getElementById(id).classList.add('active');
    }

    function pick(idx, color) {
        document.querySelectorAll('.tank-box').forEach((b, i) => b.classList.toggle('selected', i === idx));
        myColor = color;
    }

    function start() {
        const r = document.getElementById("room").value;
        if(!r) return alert("Bir oda kodu girmelisin!");
        document.getElementById("birds").play().catch(()=>{});
        channel = "creeder_v1_" + r;
        pubnub = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', uuid: myId });
        pubnub.subscribe({ channels: [channel] });
        
        pubnub.addListener({ message: (m) => {
            if(m.publisher === myId) return;
            const d = m.message;
            if(d.type === "m") game.enemies[m.publisher] = d;
            if(d.type === "f") game.bullets.push({x: d.x, y: d.y, a: d.a, owner: m.publisher, d: 0});
            if(d.type === "h" && d.target === myId && !game.player.shielded) {
                game.player.hp -= 20;
                if(game.player.hp <= 0) { game.player.hp = 100; game.player.x = 1000; game.player.y = 1000; }
            }
            if(d.type === "ps") game.powerups = d.list;
            if(d.type === "obs") obstacles = d.list;
            if(d.type === "w") { alert("ZAFER: " + d.n); location.reload(); }
        }});

        if(Object.keys(game.enemies).length === 0) spawnItems();

        setInterval(() => {
            if(game.active) pubnub.publish({ channel: channel, message: { type:"m", x:game.player.x, y:game.player.y, a:game.player.a, n:document.getElementById("nick").value, hp:game.player.hp, c:myColor, s:game.player.shielded, spd: game.player.speed }});
        }, 100);

        nav('none');
        document.getElementById("ui").style.display = "block";
        resize(); game.active = true; updateAmmo(); loop();
    }

    function spawnItems() {
        const types = ['shield', 'health', 'speed'];
        game.powerups = [];
        for(let i=0; i<5; i++) {
            game.powerups.push({ x: 300 + Math.random() * 1400, y: 300 + Math.random() * 1400, type: types[Math.floor(Math.random() * types.length)] });
        }
        pubnub.publish({ channel: channel, message: { type: "ps", list: game.powerups } });
    }

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize;

    function updateAmmo() {
        const bar = document.getElementById("ammo-bar"); bar.innerHTML = "";
        for(let i=0; i<5; i++) bar.innerHTML += `<div class="b-dot ${i < game.player.ammo ? '' : 'empty'}"></div>`;
    }

    function fire() {
        if(game.player.ammo > 0 && game.active) {
            game.player.ammo--; updateAmmo();
            game.bullets.push({x: game.player.x, y: game.player.y, a: game.player.a, owner: myId, d: 0});
            pubnub.publish({ channel: channel, message: { type: "f", x: game.player.x, y: game.player.y, a: game.player.a }});
            setTimeout(() => { if(game.player.ammo < 5) { game.player.ammo++; updateAmmo(); }}, 2200);
        }
    }

    let mx = 0, my = 0;
    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function loop() {
        if(!game.active) return;
        ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0,0,canvas.width, canvas.height);
        let camX = canvas.width/2 - game.player.x, camY = canvas.height/2 - game.player.y;
        ctx.save(); ctx.translate(camX, camY);

        // ZEMİN VE SINIRLAR
        ctx.fillStyle = "#4e6b31"; ctx.fillRect(0, 0, WORLD, WORLD);
        ctx.strokeStyle = "#3e2723"; ctx.lineWidth = 40; ctx.strokeRect(-20, -20, WORLD+40, WORLD+40);

        // ENGELLER
        obstacles.forEach(o => { 
            ctx.fillStyle = o.type === 'bale' ? (o.hp === 3 ? "#fbc02d" : (o.hp === 2 ? "#d4a017" : "#8b7500")) : "#795548";
            ctx.fillRect(o.x, o.y, o.w, o.h);
        });

        // GÜÇLENDİRMELER
        game.powerups.forEach((p, i) => {
            ctx.fillStyle = p.type === 'shield' ? "#00BFFF" : (p.type === 'health' ? "#FF3D00" : "#FFEA00");
            ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, 7); ctx.fill();
            if(Math.hypot(game.player.x - p.x, game.player.y - p.y) < 45) {
                if(p.type === 'shield') { game.player.shielded = true; setTimeout(()=> game.player.shielded = false, 8000); }
                if(p.type === 'health') game.player.hp = 100;
                if(p.type === 'speed') { game.player.speed = 11; setTimeout(()=> game.player.speed = 6, 6000); }
                game.powerups.splice(i, 1);
                pubnub.publish({ channel: channel, message: { type: "ps", list: game.powerups } });
                if(game.powerups.length < 2) setTimeout(spawnItems, 7000);
            }
        });

        // HAREKET VE KATI SINIR KONTROLÜ
        let oldX = game.player.x, oldY = game.player.y;
        let dx = 0, dy = 0;
        if(keys['KeyW']) dy = -1; if(keys['KeyS']) dy = 1; if(keys['KeyA']) dx = -1; if(keys['KeyD']) dx = 1;
        if(Math.abs(mx) > 0.1) dx = mx; if(Math.abs(my) > 0.1) dy = my;
        
        if(dx !== 0 || dy !== 0) {
            game.player.x += dx * game.player.speed; game.player.y += dy * game.player.speed;
            game.player.a = Math.atan2(dy, dx);
        }

        // Çarpışma: Engeller ve Harita Sınırı
        let collision = false;
        obstacles.forEach(o => {
            if(game.player.x-25 < o.x+o.w && game.player.x+25 > o.x && game.player.y-25 < o.y+o.h && game.player.y+25 > o.y) collision = true;
        });
        if(game.player.x < 30 || game.player.x > WORLD-30 || game.player.y < 30 || game.player.y > WORLD-30) collision = true;
        
        if(collision) { game.player.x = oldX; game.player.y = oldY; }

        // TANK ÇİZİMLERİ
        drawTank(game.player.x, game.player.y, game.player.a, myColor, "SİZ", game.player.hp, game.player.shielded, game.player.speed);
        Object.values(game.enemies).forEach(e => drawTank(e.x, e.y, e.a, e.c, e.n, e.hp, e.s, e.spd));

        // MERMİLER
        game.bullets.forEach((b, i) => {
            b.x += Math.cos(b.a) * 18; b.y += Math.sin(b.a) * 18; b.d++;
            ctx.fillStyle = "#FFEB3B"; ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, 7); ctx.fill();
            
            obstacles.forEach((o, oi) => {
                if(b.x > o.x && b.x < o.x+o.w && b.y > o.y && b.y < o.y+o.h) {
                    if(o.type === 'bale') {
                        o.hp--;
                        if(o.hp <= 0) obstacles.splice(oi, 1);
                        pubnub.publish({ channel: channel, message: { type: "obs", list: obstacles } });
                    }
                    game.bullets.splice(i, 1);
                }
            });

            if(b.owner === myId) {
                Object.keys(game.enemies).forEach(eid => {
                    let t = game.enemies[eid];
                    if(Math.hypot(b.x-t.x, b.y-t.y) < 40) {
                        pubnub.publish({ channel: channel, message: { type:"h", target:eid }});
                        game.bullets.splice(i, 1);
                    }
                });
            }
            if(b.d > 55 || b.x < 0 || b.x > WORLD || b.y < 0 || b.y > WORLD) game.bullets.splice(i, 1);
        });

        ctx.restore();
        requestAnimationFrame(loop);
    }

    function drawTank(x, y, a, c, n, hp, s, spd) {
        ctx.save(); ctx.translate(x, y);
        if(s) { ctx.strokeStyle = "#00BFFF"; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(0,0,42,0,7); ctx.stroke(); }
        if(spd > 8) { ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.beginPath(); ctx.arc(0,0,45,0,7); ctx.fill(); }
        ctx.rotate(a);
        ctx.fillStyle = "#222"; ctx.fillRect(-25, -25, 50, 50);
        ctx.fillStyle = c; ctx.fillRect(-20, -20, 40, 40);
        ctx.fillStyle = "#000"; ctx.fillRect(10, -5, 30, 10);
        ctx.restore();
        ctx.fillStyle = "black"; ctx.fillRect(x-25, y-55, 50, 8);
        ctx.fillStyle = hp > 30 ? "#4CAF50" : "#F44336"; ctx.fillRect(x-25, y-55, (hp/100)*50, 8);
        ctx.fillStyle = "white"; ctx.textAlign="center"; ctx.font="bold 14px Arial"; ctx.fillText(n, x, y-65);
    }

    const jB = document.getElementById("jBase"), jS = document.getElementById("jStick");
    const handleMove = (e) => {
        e.preventDefault();
        const t = e.touches ? e.touches[0] : e;
        const r = jB.getBoundingClientRect();
        mx = (t.clientX - (r.left + 60)) / 60; my = (t.clientY - (r.top + 60)) / 60;
        const dist = Math.min(1, Math.hypot(mx, my));
        const angle = Math.atan2(my, mx);
        jS.style.transform = `translate(${Math.cos(angle)*dist*40}px, ${Math.sin(angle)*dist*40}px)`;
    };
    jB.addEventListener("touchstart", handleMove);
    jB.addEventListener("touchmove", handleMove);
    jB.addEventListener("touchend", () => { mx = 0; my = 0; jS.style.transform = "none"; });
    document.getElementById("fBtn").addEventListener("touchstart", (e) => { e.preventDefault(); fire(); });
    window.addEventListener("keydown", (e) => { if(e.code === "Space") fire(); });
</script>
</body>
</html>
