<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREEDER ARENA - FIX 1.3</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.29.9.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #333; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; font-size: 14px; }
        #mobileMenuBtn { 
            position: absolute; top: 15px; right: 15px; 
            padding: 12px 20px; background: #f44336; 
            color: white; border-radius: 8px; z-index: 100; 
            display: none; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid white;
        }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                background: rgba(0,0,0,0.95); padding: 25px; border-radius: 15px; 
                color: white; text-align: center; border: 3px solid #4CAF50; z-index: 200; width: 85%; max-width: 350px; }
        input { padding: 12px; margin: 10px 0; border-radius: 8px; border: none; width: 90%; font-size: 16px; }
        button { padding: 15px 30px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 20px; font-weight: bold; width: 100%; }
        h1 { color: #4CAF50; font-size: 28px; margin-bottom: 15px; text-shadow: 2px 2px #000; }
        .controls { font-size: 13px; color: #aaa; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="ui">
    <div id="stats">Can: 100 | Oda: -</div>
</div>

<div id="mobileMenuBtn" onclick="location.reload()">MENÜ / ÇIKIŞ</div>

<div id="menu">
    <h1>CREEDER ARENA</h1>
    <input type="text" id="username" placeholder="Pilot İsmi" maxlength="10"><br>
    <input type="text" id="roomCode" placeholder="Oda Kodu (1907)"><br>
    <button onclick="joinGame()">SAVAŞI BAŞLAT!</button>
    <div class="controls">
        PC: WASD + Mouse<br>
        MOBİL: Ekrana Dokun (Ateş)
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let pubnub;
let myTank = { x: 100, y: 100, angle: 0, id: '', name: '', color: '', health: 100, bullets: [] };
let tanks = {};
let room = '';
let gameActive = false;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

function joinGame() {
    const name = document.getElementById('username').value || "Adsız";
    room = document.getElementById('roomCode').value || "1907";
    myTank.id = 'p-' + Math.random().toString(36).substr(2, 9);
    myTank.name = name;
    myTank.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
    myTank.x = Math.random() * (canvas.width - 60) + 30;
    myTank.y = Math.random() * (canvas.height - 60) + 30;

    document.getElementById('menu').style.display = 'none';
    document.getElementById('mobileMenuBtn').style.display = 'block';
    gameActive = true;

    if(!pubnub) {
        pubnub = new PubNub({
            publishKey: 'pub-c-8f430635-f09b-4394-874b-22003f905007',
            subscribeKey: 'sub-c-0720616b-952a-43cf-87eb-07f9208007a1',
            uuid: myTank.id
        });
    }

    pubnub.subscribe({ channels: [room] });
    pubnub.addListener({
        message: (m) => {
            if (m.message.type === 'move' && m.message.id !== myTank.id) {
                tanks[m.message.id] = {...m.message, lastSeen: Date.now()};
            }
            if (m.message.type === 'shoot' && m.message.id !== myTank.id) {
                if (tanks[m.message.id]) tanks[m.message.id].bullets.push(m.message.bullet);
            }
            if (m.message.type === 'hit' && m.message.targetId === myTank.id) {
                myTank.health -= 100;
                if(myTank.health <= 0) respawn();
            }
        }
    });

    setInterval(() => { if(gameActive) pubnub.publish({ channel: room, message: { type: 'move', ...myTank, bullets: [] } }); }, 50);
    requestAnimationFrame(gameLoop);
}

const keys = {};
window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; if (e.key === "Escape") location.reload(); };
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

window.onpointerdown = (e) => {
    if (!gameActive || e.target.id === 'mobileMenuBtn') return;
    const angle = Math.atan2(e.clientY - myTank.y, e.clientX - myTank.x);
    const bullet = { x: myTank.x, y: myTank.y, angle: angle, speed: 12, radius: 15 };
    myTank.bullets.push(bullet);
    pubnub.publish({ channel: room, message: { type: 'shoot', id: myTank.id, bullet: bullet } });
};

function respawn() {
    myTank.health = 100;
    myTank.x = Math.random() * (canvas.width - 60) + 30;
    myTank.y = Math.random() * (canvas.height - 60) + 30;
}

function drawTank(t) {
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.fillStyle = t.color;
    ctx.fillRect(-20, -20, 40, 40);
    ctx.strokeStyle = "white";
    ctx.strokeRect(-20, -20, 40, 40);
    ctx.fillStyle = "white";
    ctx.font = "bold 14px Arial";
    ctx.textAlign = "center";
    ctx.fillText(t.name, 0, -30);
    ctx.restore();

    t.bullets.forEach((b, index) => {
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();

        if (t.id === myTank.id) {
            Object.values(tanks).forEach(enemy => {
                if (Math.hypot(enemy.x - b.x, enemy.y - b.y) < 35) {
                    pubnub.publish({ channel: room, message: { type: 'hit', targetId: enemy.id } });
                    t.bullets.splice(index, 1);
                }
            });
        }
    });
}

function gameLoop() {
    if (!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (keys['w']) myTank.y -= 5; if (keys['s']) myTank.y += 5;
    if (keys['a']) myTank.x -= 5; if (keys['d']) myTank.x += 5;
    drawTank(myTank);
    Object.values(tanks).forEach(t => { if (Date.now() - t.lastSeen < 3000) drawTank(t); });
    document.getElementById('stats').innerText = `Can: ${myTank.health} | Oda: ${room} | Pilot: ${myTank.name}`;
    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
